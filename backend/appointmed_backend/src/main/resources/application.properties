spring.application.name=appointmed_backend
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRETKEY}
jwt.expiration-ms=86400000

# FR-011 business rule: patients can't reschedule/cancel within this many
# hours of the appointment start time. Change this instead of the code to
# adjust the clinic-wide cutoff window.
appointment.cutoff-hours=2

# --- Notifications (FR-013, FR-020-027) ---
# Off by default so the app runs without any SMTP setup: every notification
# still gets written to the notifications table with status=LOGGED, viewable
# via GET /api/admin/notifications. Flip to true + fill in spring.mail.*
# below to actually send real emails.
notification.email.enabled=true
notification.from-email=appointmednotificationssystem@gmail.com

# Only needed once notification.email.enabled=true. Example for Gmail:
# generate an App Password at https://myaccount.google.com/apppasswords
# (requires 2-Step Verification on the Google account) — do NOT use your
# normal Gmail password here.
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Fail fast instead of hanging — without these, a bad connection can block
# each retry attempt far longer than necessary (NotificationService retries
# up to 3x, so worst case without timeouts could be 90s+).
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Sometimes needed on hosts where the JVM trust store doesn't cleanly
# validate Gmail's cert chain.
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com


