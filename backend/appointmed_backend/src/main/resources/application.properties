# FR-011 business rule: patients can't reschedule/cancel within this many
# hours of the appointment start time. Change this instead of the code to
# adjust the clinic-wide cutoff window.
appointment.cutoff-hours=2

# --- Notifications (FR-013, FR-020-027) ---
# Off by default so the app runs without any SMTP setup: every notification
# still gets written to the notifications table with status=LOGGED, viewable
# via GET /api/admin/notifications. Flip to true + fill in spring.mail.*
# below to actually send real emails.
notification.email.enabled=true
notification.from-email=appointmednotificationssystem@gmail.com

# Only needed once notification.email.enabled=true. Example for Gmail:
# generate an App Password at https://myaccount.google.com/apppasswords
# (requires 2-Step Verification on the Google account) — do NOT use your
# normal Gmail password here.
