<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title th:text="'Appointment Rescheduled — ' + ${reference}">Appointment Rescheduled</title>
<!--[if mso]>
<style>
  * { font-family: Georgia, serif !important; }
</style>
<![endif]-->
<style>
  @media (max-width: 620px) {
    .am-container { width: 100% !important; }
    .am-pad { padding-left: 20px !important; padding-right: 20px !important; }
  }
</style>
</head>
<body style="margin:0; padding:0; background-color:#F2F7FC; font-family: 'Work Sans', Arial, Helvetica, sans-serif;">

<!-- Preheader (hidden preview text) -->
<div style="display:none; max-height:0; overflow:hidden; mso-hide:all;"
     th:text="'Your appointment with ' + ${doctorName} + ' has moved to ' + ${newDate} + ' at ' + ${newTime} + '. Ref ' + ${reference} + '.'">
  Your appointment has been rescheduled.
</div>

<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#F2F7FC; padding: 32px 16px;">
  <tr>
    <td align="center">

      <table role="presentation" width="600" cellpadding="0" cellspacing="0" class="am-container" style="width:600px; max-width:100%; background-color:#FFFFFF; border-radius:12px; overflow:hidden; border:1px solid #D7E3EE;">

        <!-- Header band -->
        <tr>
          <td style="background-color:#2F5D8A; padding: 26px 36px;" class="am-pad">
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
              <tr>
                <td style="font-family: 'Zilla Slab', Georgia, serif; font-size: 22px; font-weight: 700; color:#F2F7FC;">
                  Appoint<span style="color:#8FD0F0;">Med</span>
                </td>
                <td align="right" style="font-family: 'IBM Plex Mono', 'Courier New', monospace; font-size: 10.5px; letter-spacing: 1.5px; color:#F0DDA9; text-transform: uppercase;">
                  &#9679;&nbsp; Rescheduled
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- Status line -->
        <tr>
          <td style="padding: 36px 36px 8px 36px;" class="am-pad">
            <p style="margin:0 0 8px 0; font-family: 'IBM Plex Mono', 'Courier New', monospace; font-size: 11px; letter-spacing: 1.5px; color:#D6A13B; text-transform: uppercase; font-weight: 500;"
               th:text="'Hi ' + ${patientName} + ','">
              Hi there,
            </p>
            <h1 style="margin:0; font-family: 'Zilla Slab', Georgia, serif; font-size: 26px; line-height: 1.3; color:#2F5D8A; font-weight: 600;">
              Your appointment moved.
            </h1>
          </td>
        </tr>

        <!-- Ticket stub -->
        <tr>
          <td style="padding: 22px 36px 8px 36px;" class="am-pad">
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border: 1px solid #D7E3EE; border-radius: 10px;">

              <!-- Main ticket body -->
              <tr>
                <td style="padding: 22px 24px 18px 24px;">
                  <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                    <tr>
                      <td style="padding-bottom: 18px;">
                        <p style="margin:0; font-family: 'IBM Plex Mono', 'Courier New', monospace; font-size: 10.5px; letter-spacing: 1.2px; color:#4A7BA6; text-transform: uppercase;">Doctor</p>
                        <p style="margin: 5px 0 0 0; font-family: 'Zilla Slab', Georgia, serif; font-size: 18px; color:#2F5D8A; font-weight: 600;" th:text="${doctorName}">Doctor Name</p>
                      </td>
                    </tr>

                    <!-- Was -->
                    <tr>
                      <td style="padding-bottom: 10px;">
                        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#FBF6EC; border-radius: 8px;">
                          <tr>
                            <td style="padding: 10px 14px;">
                              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                                <tr>
                                  <td width="50%">
                                    <p style="margin:0; font-family: 'IBM Plex Mono', 'Courier New', monospace; font-size: 9.5px; letter-spacing: 1.2px; color:#B4924F; text-transform: uppercase;">Was</p>
                                    <p style="margin: 3px 0 0 0; font-size: 14px; color:#8A754A; text-decoration: line-through; text-decoration-color:#D6A13B;" th:text="${oldDate} + ' · ' + ${oldTime}">Old date &amp; time</p>
                                  </td>
                                </tr>
                              </table>
                            </td>
                          </tr>
                        </table>
                      </td>
                    </tr>

                    <!-- Now -->
                    <tr>
                      <td>
                        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#EEF6F0; border-radius: 8px;">
                          <tr>
                            <td style="padding: 10px 14px;">
                              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                                <tr>
                                  <td width="50%">
                                    <p style="margin:0; font-family: 'IBM Plex Mono', 'Courier New', monospace; font-size: 9.5px; letter-spacing: 1.2px; color:#4C9F70; text-transform: uppercase;">Now</p>
                                    <p style="margin: 3px 0 0 0; font-size: 15px; color:#2F6B45; font-weight: 600;" th:text="${newDate} + ' · ' + ${newTime}">New date &amp; time</p>
                                  </td>
                                </tr>
                              </table>
                            </td>
                          </tr>
                        </table>
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>

              <!-- Perforation -->
              <tr>
                <td style="padding: 0 12px;">
                  <div style="border-top: 1px dashed #B7CEE2;"></div>
                </td>
              </tr>

              <!-- Reference stub -->
              <tr>
                <td style="padding: 16px 24px 20px 24px; background-color:#F7FAFD; border-radius: 0 0 9px 9px;">
                  <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                    <tr>
                      <td>
                        <p style="margin:0; font-family: 'IBM Plex Mono', 'Courier New', monospace; font-size: 10.5px; letter-spacing: 1.2px; color:#4A7BA6; text-transform: uppercase;">Reference number</p>
                        <p style="margin: 5px 0 0 0; font-size: 18px; color:#3E7CB1; font-weight: 600; letter-spacing: 1px; font-family: 'IBM Plex Mono', 'Courier New', monospace;" th:text="${reference}">APT-000000</p>
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>

            </table>
          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td style="padding: 28px 36px 32px 36px; border-top: 1px solid #EAF0F7;" class="am-pad">
            <p style="margin:0; font-family: 'Work Sans', Arial, sans-serif; font-size: 12px; color:#7C93A8; line-height: 1.6;">
              &mdash; AppointMed<br>
              You're receiving this because an appointment was booked using this email address.
            </p>
          </td>
        </tr>

      </table>

    </td>
  </tr>
</table>

</body>
</html>
